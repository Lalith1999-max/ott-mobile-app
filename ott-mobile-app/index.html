<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamBox - Premium OTT</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <!-- App Header / Top Nav -->
    <header class="app-header">
        <div class="logo">
            <span class="brand-text">StreamBox</span>
            <span class="brand-dot"></span>
        </div>
        <div class="header-actions">
            <button class="icon-btn cast-btn"><span class="material-symbols-rounded">cast</span></button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-content">
        <!-- Hero section will be injected here -->
        <div id="hero-container"></div>
        <!-- Categories will be injected here -->
        <div id="categories-container"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active">
            <span class="material-symbols-rounded nav-icon">home</span>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-item">
            <span class="material-symbols-rounded nav-icon">search</span>
            <span class="nav-label">Search</span>
        </button>
        <button class="nav-item">
            <span class="material-symbols-rounded nav-icon">live_tv</span>
            <span class="nav-label">Live</span>
        </button>
        <button class="nav-item">
            <span class="material-symbols-rounded nav-icon">download</span>
            <span class="nav-label">Downloads</span>
        </button>
        <button class="nav-item">
            <span class="material-symbols-rounded nav-icon">person</span>
            <span class="nav-label">My Space</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
